# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to prepend to the slug
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autocommit
# revision_environment = false

# set to 'true' to allow modules to be imported from the current directory
prepend_sys_path = .

# version path separator; default is os.pathsep.
# version_path_separator = :

# set to 'true' to search for version files recursively
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

# sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/inventory_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)-5.5s] [%(name)s] %(message)s
datefmt = %H:%M:%S
